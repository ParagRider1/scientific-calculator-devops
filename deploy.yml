- hosts: servers
  tasks:

    - name: Pull Docker image
      command: docker pull paragrider1/scientific-calculator

    - name: Stop old container if running
      command: docker stop scientific-calculator
      ignore_errors: yes

    - name: Remove old container
      command: docker rm scientific-calculator
      ignore_errors: yes

    - name: Run new container
      command: docker run -d --name scientific-calculator paragrider1/scientific-calculator